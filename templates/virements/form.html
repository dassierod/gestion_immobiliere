{% extends 'base.html' %}
{% block title %}Nouveau virement{% endblock %}
{% block breadcrumb %}
<li class="breadcrumb-item"><a href="{{ url_for('virements_list') }}">Virements</a></li>
<li class="breadcrumb-item active">Nouveau virement</li>
{% endblock %}

{% block content %}
<div class="page-header">
    <h1><i class="bi bi-arrow-up-circle me-2 text-primary"></i>Enregistrer un virement</h1>
</div>

<div class="row">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body">
                <form method="post">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label fw-semibold">Propriétaire <span class="text-danger">*</span></label>
                            <select class="form-select" name="proprietaire_id" required>
                                <option value="">-- Sélectionner un propriétaire --</option>
                                {% for p in proprietaires %}
                                <option value="{{ p.id }}" {% if virement and virement.proprietaire_id == p.id %}selected{% endif %}>
                                    {{ p.prenom }} {{ p.nom }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Date du virement <span class="text-danger">*</span></label>
                            <input type="date" class="form-control" name="date_virement" required
                                value="{{ virement.date_virement.strftime('%Y-%m-%d') if virement else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Montant (FCFA) <span class="text-danger">*</span></label>
                            <input type="number" step="1" class="form-control" name="montant" required
                                value="{{ virement.montant if virement else '' }}" placeholder="150000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Mode de virement</label>
                            <select class="form-select" name="mode_virement">
                                {% for m in ['Espèces', 'Mobile Money', 'Virement bancaire', 'Chèque'] %}
                                <option value="{{ m }}" {% if virement and virement.mode_virement == m %}selected{% elif not virement and m == 'Mobile Money' %}selected{% endif %}>{{ m }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Référence</label>
                            <input type="text" class="form-control" name="reference"
                                value="{{ virement.reference if virement else '' }}" placeholder="VIR-2024-001">
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold">Note</label>
                            <textarea class="form-control" name="note" rows="2">{{ virement.note if virement else '' }}</textarea>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg me-2"></i>Enregistrer
                        </button>
                        <a href="{{ url_for('virements_list') }}" class="btn btn-outline-secondary">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
